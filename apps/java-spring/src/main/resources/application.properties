spring.application.name=java-spring
server.port=8002
server.address=0.0.0.0

# Database
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:cookiecrumbs}
spring.datasource.username=${POSTGRES_USER:cookiecrumbs}
spring.datasource.password=${POSTGRES_PASSWORD:cookiecrumbs}
spring.datasource.driver-class-name=org.postgresql.Driver

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Sentry
sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SENTRY_ENVIRONMENT:development}
sentry.release=${SENTRY_RELEASE:1.0.0}
sentry.traces-sample-rate=1.0
sentry.profiles-sample-rate=1.0
sentry.logs.enabled=true
sentry.minimum-event-level=error
